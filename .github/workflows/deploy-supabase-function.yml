name: Deploy Supabase Edge Function

on:
  workflow_dispatch:  # Run manually from Actions tab
  push:
    branches: [main]
    paths:
      - 'Cornbet MVP/server/**'
      - 'Cornbet MVP/supabase/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        working-directory: Cornbet MVP

    steps:
      - uses: actions/checkout@v4

      - name: Verify structure
        working-directory: .
        run: |
          echo "Contents of repo root:"
          ls -la
          echo "Contents of Cornbet MVP:"
          ls -la "Cornbet MVP/" 2>/dev/null || echo "(path check)"

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Prepare function for deploy
        run: |
          mkdir -p supabase/functions/make-server-55aa94ce
          cp server/index.tsx server/kv_store.tsx supabase/functions/make-server-55aa94ce/

      - name: Link project
        run: supabase link --project-ref hkguncfsuubqzsdguhfk

      - name: Deploy function
        run: supabase functions deploy make-server-55aa94ce --no-verify-jwt
