[build]
  publish = "dist"
  # Always deploy — never skip based on content hash
  ignore = "exit 1"

# Proxy /api/* to the Supabase Edge Function (mirrors the Vite dev proxy)
[[redirects]]
  from = "/api/*"
  to = "https://hkguncfsuubqzsdguhfk.supabase.co/functions/v1/make-server-55aa94ce/:splat"
  status = 200
  force = true

# SPA fallback — serve index.html for all non-asset routes so React Router works
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
